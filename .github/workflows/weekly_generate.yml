name: Weekly Article Generation

on:
  schedule:
    # 毎週日曜日 20:00 JST (= 11:00 UTC)
    - cron: '0 11 * * 0'
  workflow_dispatch:  # 手動実行も可能

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate-weekly-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate weekly article
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python weekly_generate_only.py

      - name: Update Ginji state (micro-evolution)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python state_updater.py

      - name: Commit and push generated weekly article
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add weekly_articles/ ginji_state.json
          git diff --staged --quiet || git commit -m "bot: 週次記事を自動生成しました、ぎんじの状態を更新 ($(date +'%Y-%m-%d'))"
          git push
