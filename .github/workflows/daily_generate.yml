name: Daily Article Generation

on:
  schedule:
    # 毎日 07:30 JST (= 22:30 UTC 前日) と 19:30 JST (= 10:30 UTC)
    - cron: '30 22 * * *'  # 朝7:30 JST
    - cron: '30 10 * * *'  # 夜19:30 JST
  workflow_dispatch:        # 手動実行も可能

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate article
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python main_generate_only.py

      - name: Commit and push generated article
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add articles/
          # 新しい記事がある場合のみコミット
          git diff --staged --quiet || git commit -m "bot: 記事を自動生成しました ($(date +'%Y-%m-%d %H:%M JST'))"
          git push
